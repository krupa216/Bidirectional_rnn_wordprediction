<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Word Predictor | AI Text Completion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .suggestion {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--primary);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .suggestion:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .instructions {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .predict-btn {
            width: 100%;
            padding: 1rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--primary), #818cf8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
            filter: brightness(1.1);
        }

        .predict-btn:active {
            transform: translateY(0);
        }

        .instructions code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            color: #818cf8;
        }
    </style>
</head>

<body>
    <div class="container">
        
        <h1>Text Completion AI</h1>
        <p class="subtitle">Start typing to see real-time next-word predictions powered by a Bidirectional RNN.</p>

        <div class="input-group">
            <textarea id="editor" placeholder="Deep learning has revolutionized..."></textarea>
            <div id="suggestion" class="suggestion"></div>
        </div>

        <button id="predict-btn" class="predict-btn">Predict Next Word</button>

        
    </div>

    <script>
        const editor = document.getElementById('editor');
        const suggestion = document.getElementById('suggestion');
        const predictBtn = document.getElementById('predict-btn');
        let currentPrediction = '';

        const getPrediction = async () => {
            const text = editor.value.trim();
            if (!text) {
                suggestion.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                if (data.prediction) {
                    currentPrediction = data.prediction;
                    suggestion.innerText = currentPrediction;
                    suggestion.style.display = 'block';
                } else {
                    suggestion.style.display = 'none';
                    alert("No prediction found for this context.");
                }
            } catch (err) {
                console.error('Fetch error:', err);
                suggestion.style.display = 'none';
                alert("Error connecting to server. Make sure app.py is running.");
            }
        };

        predictBtn.addEventListener('click', getPrediction);

        editor.addEventListener('input', () => {
            // Hide suggestion when typing resumes to indicate change
            suggestion.style.display = 'none';
        });

        const acceptPrediction = () => {
            if (currentPrediction) {
                editor.value = editor.value.trimEnd() + ' ' + currentPrediction + ' ';
                suggestion.style.display = 'none';
                currentPrediction = '';
                editor.focus();
            }
        };

        suggestion.addEventListener('click', acceptPrediction);

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && currentPrediction) {
                e.preventDefault();
                acceptPrediction();
            }
        });
    </script>
</body>

</html>
